{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: ecommerce-ingress
    app.kubernetes.io/part-of: ecommerce-devsecops
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}

  {{- if .Values.ingress.tls }}
  tls:
{{ toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}

  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          # API traffic goes to api-gateway.
          # Do not rewrite this path because your api-gateway expects /api/users/**, /api/products/** etc.
          - path: {{ .Values.ingress.paths.api | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.services.apiGateway.name }}
                port:
                  number: {{ .Values.ingress.services.apiGateway.port }}

          # Everything else goes to frontend.
          - path: {{ .Values.ingress.paths.frontend | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.services.frontend.name }}
                port:
                  number: {{ .Values.ingress.services.frontend.port }}
{{- end }}
