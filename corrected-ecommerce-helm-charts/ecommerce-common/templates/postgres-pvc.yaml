apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: {{ .Values.namespace.name }}
spec:
  accessModes:
    - ReadWriteOnce
{{- if .Values.postgres.storageClassName }}
  storageClassName: {{ .Values.postgres.storageClassName | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage | quote }}
