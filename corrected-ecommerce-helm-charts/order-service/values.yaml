
replicaCount: 1
namespace: ecommerce-devops

image:
  repository: dheerajkadve/order-service
  tag: "13"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8084
  targetPort: 8084

containerPort: 8084
configMapName: ecommerce-config
secretName: ecommerce-secret

envFromConfigMap:
  - name: SPRING_PROFILES_ACTIVE
    key: SPRING_PROFILES_ACTIVE
  - name: SPRING_DATASOURCE_URL
    key: ORDER_DB_URL
  - name: INVENTORY_SERVICE_URL
    key: INVENTORY_SERVICE_URL
  - name: PAYMENT_SERVICE_URL
    key: PAYMENT_SERVICE_URL
  - name: NOTIFICATION_SERVICE_URL
    key: NOTIFICATION_SERVICE_URL
  - name: CART_SERVICE_URL
    key: CART_SERVICE_URL

envFromSecret:
  - name: SPRING_DATASOURCE_USERNAME
    key: POSTGRES_USER
  - name: SPRING_DATASOURCE_PASSWORD
    key: POSTGRES_PASSWORD

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

podLabels:
  newrelic-apm: java

