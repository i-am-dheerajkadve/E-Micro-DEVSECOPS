name: CI/CD Pipeline

on:
 workflow_dispatch: 
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Build & Test Maven Services
      - name: Build and Test Maven Services
        run: |
          for service in api-gateway user-service order-service inventory-service; do
            echo "Building Maven service: $service"
            cd $service
            mvn clean package -DskipTests=false
            cd ..
          done

      # Build & Test Gradle Services
      - name: Build and Test Gradle Services
        run: |
          for service in product-service cart-service payment-service notification-service; do
            echo "Building Gradle service: $service"
            cd $service
            chmod +x gradlew
            ./gradlew build -x test
            ./gradlew test
            cd ..
          done

