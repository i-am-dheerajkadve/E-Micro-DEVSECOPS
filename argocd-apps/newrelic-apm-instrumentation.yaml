apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newrelic-apm-instrumentation
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/i-am-dheerajkadve/E-Micro-DEVSECOPS.git
    targetRevision: main
    path: newrelic-apm

  destination:
    server: https://kubernetes.default.svc
    namespace: newrelic

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
