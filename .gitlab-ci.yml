stages:
  - prepare_tools
  - sonarqube
  - junit_test
  - docker_build
  - trivy_scan
  - docker_push

variables:
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

  # DockerHub namespace should come from GitLab CI/CD variable DOCKERHUB_USER
  DOCKERHUB_NAMESPACE: "$DOCKERHUB_USER"

  # Nexus raw repository name
  NEXUS_RAW_REPO: "devsecops-reports"

  # Because SonarQube and Nexus run on the same EC2 as the GitLab runner
  SONAR_HOST_URL: "http://127.0.0.1:9000"
  NEXUS_URL: "http://127.0.0.1:8081"

  SONAR_PROJECT_KEY: "E-Micro-DEVSECOPS"
  SONAR_PROJECT_NAME: "E-Micro-DEVSECOPS"

  SERVICES: "api-gateway user-service product-service cart-service order-service payment-service inventory-service notification-service frontend"
  JAVA_SERVICES: "api-gateway user-service product-service cart-service order-service payment-service inventory-service notification-service"

  MAVEN_CACHE: "$CI_PROJECT_DIR/.m2"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  key: "$CI_PROJECT_NAME"
  paths:
    - .m2/
    - .gradle/
    - .sonar/
    - .trivycache/

default:
  tags:
    - devsecops

# ---------------------------------------------------------
# 1. Start SonarQube and Nexus from sonar-nexus/docker-compose.yml
# ---------------------------------------------------------
start_sonar_nexus:
  stage: prepare_tools
  script:
    - docker compose -f sonar-nexus/docker-compose.yml up -d
    - echo "Waiting for SonarQube and Nexus..."

    - |
      for i in $(seq 1 60); do
        if curl -sf "$SONAR_HOST_URL/api/system/status" | grep -E '"status":"(UP|DEGRADED)"' > /dev/null; then
          echo "SonarQube is ready."
          break
        fi
        echo "Waiting for SonarQube... attempt $i"
        sleep 5
      done

    - |
      for i in $(seq 1 60); do
        if curl -sf "$NEXUS_URL" > /dev/null; then
          echo "Nexus is ready."
          break
        fi
        echo "Waiting for Nexus... attempt $i"
        sleep 5
      done

    - docker ps

# ---------------------------------------------------------
# 2. SonarQube scan + upload SonarQube JSON reports to Nexus
# ---------------------------------------------------------
sonarqube_scan:
  stage: sonarqube
  needs:
    - start_sonar_nexus
  script:
    - mkdir -p reports/sonarqube "$MAVEN_CACHE" "$GRADLE_USER_HOME" .sonar

    - |
      upload_dir_to_nexus() {
        local dir="$1"
        local nexus_folder="$2"

        if [ ! -d "$dir" ]; then
          echo "Directory $dir not found, skipping Nexus upload."
          return 0
        fi

        find "$dir" -type f | while read -r file; do
          rel="${file#$dir/}"
          echo "Uploading $file to Nexus..."
          curl --fail -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file "$file" \
            "$NEXUS_URL/repository/$NEXUS_RAW_REPO/$CI_PROJECT_NAME/$CI_PIPELINE_ID/$nexus_folder/$rel"
        done
      }

    # Compile Java code first because SonarQube Java scan needs class files.
    - |
      for dir in $JAVA_SERVICES; do
        echo "Preparing bytecode for SonarQube: $dir"

        if [ -f "$dir/pom.xml" ]; then
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$CI_PROJECT_DIR:/workspace" \
            -v "$MAVEN_CACHE:/tmp/.m2" \
            -e MAVEN_CONFIG=/tmp/.m2 \
            -w "/workspace/$dir" \
            maven:3.9.9-eclipse-temurin-17 \
            mvn clean compile -DskipTests
        elif [ -f "$dir/build.gradle" ] || [ -f "$dir/build.gradle.kts" ]; then
         docker run --rm \
          -v "$CI_PROJECT_DIR:/workspace" \
          -w "/workspace/$dir" \
          gradle:7.5.1-jdk17 \
          bash -c "gradle clean classes -x test --no-daemon"
        fi
      done
    - rm -rf .scannerwork .sonar reports/sonarqube
    - mkdir -p .scannerwork .sonar reports/sonarqube
    - chmod -R 777 .scannerwork .sonar reports
    # Run SonarQube scan.
    - |
      SONAR_FAILED=0

      docker run --rm \
        --network host \
        --user "$(id -u):$(id -g)" \
        -e SONAR_USER_HOME=/tmp/.sonar \
        -v "$CI_PROJECT_DIR:/usr/src" \
        -v "$CI_PROJECT_DIR/.sonar:/tmp/.sonar" \
        -w /usr/src \
        sonarsource/sonar-scanner-cli:latest \
        -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
        -Dsonar.projectName="$SONAR_PROJECT_NAME" \
        -Dsonar.sources=. \
        -Dsonar.host.url="$SONAR_HOST_URL" \
        -Dsonar.token="$SONAR_TOKEN" \
        -Dsonar.java.binaries="api-gateway/target/classes,user-service/target/classes,order-service/target/classes,inventory-service/target/classes,product-service/build/classes,cart-service/build/classes,payment-service/build/classes,notification-service/build/classes" \
        -Dsonar.exclusions="**/node_modules/**,**/target/**,**/build/**,**/.gradle/**,**/.m2/**,reports/**" \
        || SONAR_FAILED=1

      echo "$SONAR_FAILED" > reports/sonarqube/sonar_exit_code.txt

    # Download basic SonarQube reports from API.
    - |
      curl -sf -u "$SONAR_TOKEN:" \
        "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY" \
        -o reports/sonarqube/quality-gate.json || true

      curl -sf -u "$SONAR_TOKEN:" \
        "$SONAR_HOST_URL/api/measures/component?component=$SONAR_PROJECT_KEY&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,security_hotspots" \
        -o reports/sonarqube/measures.json || true

      curl -sf -u "$SONAR_TOKEN:" \
        "$SONAR_HOST_URL/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&ps=500" \
        -o reports/sonarqube/issues.json || true

    - upload_dir_to_nexus "reports/sonarqube" "sonarqube"

    # Keep pipeline moving for learning/demo even if quality gate fails.
    - exit 0

  artifacts:
    when: always
    paths:
      - reports/sonarqube/
    expire_in: 7 days

# ---------------------------------------------------------
# 3. JUnit tests + upload JUnit reports to Nexus
# ---------------------------------------------------------
junit_tests:
  stage: junit_test
  needs:
    - start_sonar_nexus
  script:
    - mkdir -p reports/junit "$MAVEN_CACHE" "$GRADLE_USER_HOME"

    - |
      upload_dir_to_nexus() {
        local dir="$1"
        local nexus_folder="$2"

        if [ ! -d "$dir" ]; then
          echo "Directory $dir not found, skipping Nexus upload."
          return 0
        fi

        find "$dir" -type f | while read -r file; do
          rel="${file#$dir/}"
          echo "Uploading $file to Nexus..."
          curl --fail -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file "$file" \
            "$NEXUS_URL/repository/$NEXUS_RAW_REPO/$CI_PROJECT_NAME/$CI_PIPELINE_ID/$nexus_folder/$rel"
        done
      }

    - |
      TEST_FAILED=0

      for dir in $JAVA_SERVICES; do
        echo "Running JUnit tests for: $dir"

        mkdir -p "reports/junit/$dir"

        if [ -f "$dir/pom.xml" ]; then
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$CI_PROJECT_DIR:/workspace" \
            -v "$MAVEN_CACHE:/tmp/.m2" \
            -e MAVEN_CONFIG=/tmp/.m2 \
            -w "/workspace/$dir" \
            maven:3.9.9-eclipse-temurin-17 \
            mvn test || TEST_FAILED=1

          cp -r "$dir/target/surefire-reports/"*.xml "reports/junit/$dir/" 2>/dev/null || true

        elif [ -f "$dir/build.gradle" ] || [ -f "$dir/build.gradle.kts" ]; then
         docker run --rm \
          -v "$CI_PROJECT_DIR:/workspace" \
          -w "/workspace/$dir" \
          gradle:7.5.1-jdk17 \
          bash -c "gradle test --no-daemon" || TEST_FAILED=1

          cp -r "$dir/build/test-results/test/"*.xml "reports/junit/$dir/" 2>/dev/null || true
        fi
      done

      upload_dir_to_nexus "reports/junit" "junit"

      exit "$TEST_FAILED"

  artifacts:
    when: always
    paths:
      - reports/junit/
    reports:
      junit:
        - reports/junit/**/*.xml
    expire_in: 7 days

# ---------------------------------------------------------
# 4. Build Docker images for all services and frontend
# ---------------------------------------------------------
docker_build:
  stage: docker_build
  needs:
    - junit_tests
  script:
    - mkdir -p image-list
    - rm -f image-list/images.txt
    - touch image-list/images.txt

    - |
      for service in $SERVICES; do
        if [ ! -f "$service/Dockerfile" ]; then
          echo "No Dockerfile found in $service, skipping."
          continue
        fi

        image="$DOCKERHUB_NAMESPACE/$service:$IMAGE_TAG"

        echo "Building Docker image: $image"
        docker build --pull -t "$image" "./$service"

        echo "$image" >> image-list/images.txt
      done

    - echo "Images built:"
    - cat image-list/images.txt

  artifacts:
    paths:
      - image-list/images.txt
    expire_in: 7 days

# ---------------------------------------------------------
# 5. Trivy scan Docker images + upload reports to Nexus
# ---------------------------------------------------------
trivy_scan:
  stage: trivy_scan
  needs:
    - docker_build
    - start_sonar_nexus
  script:
    - mkdir -p reports/trivy .trivycache

    - |
      upload_dir_to_nexus() {
        local dir="$1"
        local nexus_folder="$2"

        if [ ! -d "$dir" ]; then
          echo "Directory $dir not found, skipping Nexus upload."
          return 0
        fi

        find "$dir" -type f | while read -r file; do
          rel="${file#$dir/}"
          echo "Uploading $file to Nexus..."
          curl --fail -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file "$file" \
            "$NEXUS_URL/repository/$NEXUS_RAW_REPO/$CI_PROJECT_NAME/$CI_PIPELINE_ID/$nexus_folder/$rel"
        done
      }

    - |
      while read -r image; do
        [ -z "$image" ] && continue

        service_name="$(basename "${image%:*}")"

        echo "Running Trivy scan for $image"

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$CI_PROJECT_DIR/.trivycache:/root/.cache/" \
          -v "$CI_PROJECT_DIR/reports/trivy:/reports" \
          aquasec/trivy:latest \
          image --format json --output "/reports/$service_name-trivy.json" "$image" || true

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$CI_PROJECT_DIR/.trivycache:/root/.cache/" \
          -v "$CI_PROJECT_DIR/reports/trivy:/reports" \
          aquasec/trivy:latest \
          image --format table --output "/reports/$service_name-trivy.txt" "$image" || true

      done < image-list/images.txt

    - upload_dir_to_nexus "reports/trivy" "trivy"

  artifacts:
    when: always
    paths:
      - reports/trivy/
    expire_in: 7 days

# ---------------------------------------------------------
# 6. Push all Docker images to DockerHub
# ---------------------------------------------------------
docker_push:
  stage: docker_push
  needs:
    - docker_build
    - trivy_scan
  before_script:
    - echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USER" --password-stdin
  script:
    - |
      while read -r image; do
        [ -z "$image" ] && continue

        service_name="$(basename "${image%:*}")"
        latest_image="$DOCKERHUB_NAMESPACE/$service_name:latest"

        echo "Pushing image: $image"
        docker push "$image"

        echo "Tagging and pushing latest image: $latest_image"
        docker tag "$image" "$latest_image"
        docker push "$latest_image"

      done < image-list/images.txt