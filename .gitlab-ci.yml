stages:
  - start_tools
  - sonarqube_scan

variables:
  GIT_DEPTH: "0"
  SONAR_PROJECT_KEY: "E-Micro-DEVSECOPS"

start_sonar_nexus:
  stage: start_tools
  tags:
    - devsecops
  script:
    - echo "Starting SonarQube and Nexus..."
    - docker compose -f sonar-nexus/docker-compose.yml up -d
    - echo "Waiting for SonarQube to become ready..."
    - |
      for i in {1..30}; do
        STATUS=$(curl -s "$SONAR_HOST_URL/api/system/status" | grep -o '"status":"[^"]*"' || true)
        echo "SonarQube status: $STATUS"

        if echo "$STATUS" | grep -q "UP"; then
          echo "SonarQube is ready."
          exit 0
        fi

        sleep 10
      done

      echo "SonarQube did not become ready in time."
      docker ps
      exit 1
    - docker ps

sonarqube_scan:
  stage: sonarqube_scan
  tags:
    - devsecops
  script:
    - echo "Running SonarQube scan..."
    - |
      docker run --rm \
        --network host \
        --user "$(id -u):$(id -g)" \
        -v "$CI_PROJECT_DIR:/usr/src" \
        sonarsource/sonar-scanner-cli:latest \
        -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
        -Dsonar.projectName="$SONAR_PROJECT_KEY" \
        -Dsonar.sources=. \
        -Dsonar.host.url="$SONAR_HOST_URL" \
        -Dsonar.token="$SONAR_TOKEN"